<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Max</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', Arial, sans-serif;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    header svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #ff0000;
      letter-spacing: 0.3px;
    }

    .status-card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 14px;
      color: #aaa;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 26px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #ff0000;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(22px);
    }

    .shortcut-info {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .shortcut-info p {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .shortcut-desc {
      font-size: 13px;
      color: #ccc;
    }

    kbd {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: #fff;
      font-family: monospace;
    }

    .note {
      font-size: 11px;
      color: #555;
      text-align: center;
      line-height: 1.5;
    }

    .not-youtube {
      font-size: 13px;
      color: #888;
      text-align: center;
      padding: 10px 0;
    }
  </style>
</head>
<body>
  <header>
    <!-- YouTube-style play icon -->
    <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <rect width="90" height="90" rx="18" fill="#FF0000"/>
      <polygon points="35,25 65,45 35,65" fill="#fff"/>
    </svg>
    <h1>YouTube Max</h1>
  </header>

  <div id="main-controls">
    <div class="status-card">
      <span class="status-label" id="status-text">Windowed Fullscreen</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-btn" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="shortcut-info">
      <p>Keyboard shortcuts</p>
      <div class="shortcut-row">
        <span class="shortcut-desc">Toggle windowed FS</span>
        <div>
          <kbd>W</kbd>
          &nbsp;or&nbsp;
          <kbd>Alt+W</kbd>
        </div>
      </div>
    </div>

    <p class="note">Works on YouTube watch pages.<br/>Press <kbd>W</kbd> while the page is focused.</p>
  </div>

  <div id="not-youtube" class="not-youtube" style="display:none;">
    Navigate to a YouTube video to use this extension.
  </div>

  <script src="popup.js"></script>
</body>
</html>
